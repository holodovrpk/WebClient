<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Рейтинг</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">
        <span class="navbar-brand">ИТ-Проф</span>
        <div>
            <label id="user_name"></label>
            <a href="edit-profile.html" class="btn btn-sm btn-outline-primary ms-2">Редактировать</a>
            <button class="btn btn-sm btn-outline-danger" onclick="logout()">Выход</button>
        </div>
    </div>
</nav>

<div class="card mb-3">
    <div class="card-body">
        <h5>📊 Мой рейтинг</h5>


         <p class="mb-1">Индекс компетенций: <b id="indexText">0%</b></p>
            <div class="progress mb-3">
                <div id="competenceBar" class="progress-bar" style="width:0%"></div>
            </div>

        <div style="max-width:300px">
            <canvas id="ratingChart"></canvas>
        </div>

        <p class="mt-3">
            Образование 30% | Опыт 30% | Подтверждения 40%
        </p>
    </div>
</div>


<select id="period" class="form-select mb-3" onchange="loadChart()">
    <option value="30">30 дней</option>
    <option value="90">90 дней</option>
</select>

<canvas id="historyChart" width="600" height="300"></canvas>

<h3>Рекомендации</h3>
<table class="table">
    <tbody id="recomendationTable"></tbody>
</table>



<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/rating.js"></script>
<script src="js/chart.umd.min.js"></script>
</body>
</html>
